name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    environment: .env
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      CAS_API_KEY: ${{ secrets.CAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -r requirements.txt

      - name: Run self-checks (no network)
        run: |
          python test_fetch_exomol_sample.py
          python test_force_override.py

      - name: Fetch AloHa sample data (27Al-1H, 27Al-2H)
        run: |
          python fetch_exomol_sample.py 27Al-1H AloHa samples/AloHa/work_dir
          python fetch_exomol_sample.py 27Al-2H AloHa samples/AloHa/work_dir

      - name: Stage AloHa.inp into work dir
        run: cp samples/AloHa/AloHa.inp samples/AloHa/work_dir/AloHa.inp

      - run: python create_def.py --init samples/AloHa/work_dir
      - run: python create_def.py samples/AloHa/work_dir

      - name: Diff AloHa build output against fetched reference
        run: |
          python .github/scripts/check_aloha_ref.py samples/AloHa/work_dir/27Al-1H__AloHa samples/AloHa/work_dir/ref/27Al-1H__AloHa
          python .github/scripts/check_aloha_ref.py samples/AloHa/work_dir/27Al-2H__AloHa samples/AloHa/work_dir/ref/27Al-2H__AloHa

      - name: Verify --force overrides validation errors
        run: python .github/scripts/check_force_override.py samples/AloHa/work_dir

      - name: Fetch Dozen sample data (12C-16O2)
        run: python fetch_exomol_sample.py 12C-16O2 Dozen samples/Dozen/work_dir --trans-files 2

      - name: Stage Dozen.inp into work dir
        run: cp samples/Dozen/Dozen.inp samples/Dozen/work_dir/Dozen.inp

      - run: python create_def.py --init samples/Dozen/work_dir
      - run: python create_def.py samples/Dozen/work_dir

      - name: Diff Dozen build output against fetched reference
        run: python .github/scripts/check_dozen_ref.py samples/Dozen/work_dir/12C-16O2__Dozen samples/Dozen/work_dir/ref/12C-16O2__Dozen
