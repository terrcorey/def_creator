name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    environment: .env
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      CAS_API_KEY: ${{ secrets.CAS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch AloHa sample data (27Al-1H, 27Al-2H)
        run: |
          python fetch_exomol_sample.py 27Al-1H AloHa samples/AloHa/work_dir
          python fetch_exomol_sample.py 27Al-2H AloHa samples/AloHa/work_dir

      - name: Stage AloHa.inp into work dir
        run: cp samples/AloHa/AloHa.inp samples/AloHa/work_dir/AloHa.inp

      - run: python create_def.py --init samples/AloHa/work_dir
      - run: python create_def.py samples/AloHa/work_dir

      - name: Diff build output against fetched reference
        run: |
          python .github/scripts/check_aloha_ref.py samples/AloHa/work_dir/27Al-1H__AloHa samples/AloHa/work_dir/ref/27Al-1H__AloHa
          python .github/scripts/check_aloha_ref.py samples/AloHa/work_dir/27Al-2H__AloHa samples/AloHa/work_dir/ref/27Al-2H__AloHa
